services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${TASKFLOW_POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${TASKFLOW_POSTGRES_PASSWORD:-taskflow}
      POSTGRES_DB: ${TASKFLOW_POSTGRES_DB:-taskflow}
    ports:
      - "${TASKFLOW_POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TASKFLOW_POSTGRES_USER:-taskflow} -d ${TASKFLOW_POSTGRES_DB:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_NAME: ${TASKFLOW_APP_NAME:-TaskFlow API}
      ENVIRONMENT: ${TASKFLOW_ENVIRONMENT:-development}
      DEBUG: ${TASKFLOW_DEBUG:-true}
      API_HOST: ${TASKFLOW_API_HOST:-0.0.0.0}
      API_PORT: ${TASKFLOW_API_PORT:-8000}
      LOG_LEVEL: ${TASKFLOW_LOG_LEVEL:-INFO}
      POSTGRES_HOST: ${TASKFLOW_POSTGRES_HOST:-db}
      POSTGRES_PORT: ${TASKFLOW_POSTGRES_PORT:-5432}
      POSTGRES_USER: ${TASKFLOW_POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${TASKFLOW_POSTGRES_PASSWORD:-taskflow}
      POSTGRES_DB: ${TASKFLOW_POSTGRES_DB:-taskflow}
      DATABASE_URL: ${TASKFLOW_DATABASE_URL:-postgresql+psycopg://${TASKFLOW_POSTGRES_USER:-taskflow}:${TASKFLOW_POSTGRES_PASSWORD:-taskflow}@${TASKFLOW_POSTGRES_HOST:-db}:${TASKFLOW_POSTGRES_PORT:-5432}/${TASKFLOW_POSTGRES_DB:-taskflow}}
      JWT_SECRET: ${TASKFLOW_JWT_SECRET:-change-me-in-production-use-openssl-rand-hex-32}
      JWT_ALGORITHM: ${TASKFLOW_JWT_ALGORITHM:-HS256}
      BCRYPT_ROUNDS: ${TASKFLOW_BCRYPT_ROUNDS:-12}
      SEED_USER_EMAIL: ${TASKFLOW_SEED_USER_EMAIL:-test@example.com}
      SEED_USER_PASSWORD: ${TASKFLOW_SEED_USER_PASSWORD:-password123}
      SEED_USER_NAME: ${TASKFLOW_SEED_USER_NAME:-Test User}
      RUN_DB_SEED: ${TASKFLOW_RUN_DB_SEED:-true}
    ports:
      - "${TASKFLOW_API_PUBLISH_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
